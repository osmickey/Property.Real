<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Marina waterfront at night">
  <defs>
    <linearGradient id="g4sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="70%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0D7377"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#g4sky)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#FAF8F5" opacity="0.8"/>
  <circle cx="300" cy="50" r="2" fill="#FAF8F5" opacity="0.7"/>
  <circle cx="500" cy="100" r="1.5" fill="#FAF8F5" opacity="0.6"/>
  <circle cx="450" cy="60" r="1" fill="#FAF8F5" opacity="0.5"/>
  <!-- Towers -->
  <rect x="60" y="250" width="55" height="350" fill="#1B4965" opacity="0.7"/>
  <rect x="150" y="200" width="50" height="400" fill="#1B4965" opacity="0.75"/>
  <rect x="250" y="280" width="60" height="320" fill="#1B4965" opacity="0.65"/>
  <rect x="380" y="220" width="55" height="380" fill="#1B4965" opacity="0.7"/>
  <rect x="480" y="300" width="50" height="300" fill="#1B4965" opacity="0.65"/>
  <!-- Lights -->
  <rect x="70" y="300" width="6" height="6" fill="#E8C547" opacity="0.9"/>
  <rect x="90" y="350" width="6" height="6" fill="#E07A5F" opacity="0.8"/>
  <rect x="160" y="280" width="6" height="6" fill="#E8C547" opacity="0.85"/>
  <rect x="390" y="320" width="6" height="6" fill="#14A085" opacity="0.9"/>
  <rect x="410" y="380" width="6" height="6" fill="#E8C547" opacity="0.8"/>
  <!-- Water -->
  <rect y="580" width="600" height="170" fill="#0D7377" opacity="0.5"/>
  <!-- Reflections -->
  <rect x="70" y="590" width="6" height="40" fill="#E8C547" opacity="0.3"/>
  <rect x="160" y="590" width="6" height="50" fill="#E8C547" opacity="0.25"/>
  <rect x="390" y="590" width="6" height="45" fill="#14A085" opacity="0.3"/>
  <text x="300" y="720" text-anchor="middle" fill="#FAF8F5" font-family="Georgia, serif" font-size="18" opacity="0.8">Marina at Night</text>
</svg>
