<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Dubai Marina apartment">
  <defs>
    <linearGradient id="p3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="50%" stop-color="#3D5A80"/>
      <stop offset="100%" stop-color="#E07A5F"/>
    </linearGradient>
    <linearGradient id="p3water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D7377"/>
      <stop offset="100%" stop-color="#14A085"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#p3bg)"/>
  <!-- Marina towers -->
  <rect x="80" y="200" width="70" height="350" fill="#FAF8F5" opacity="0.15" rx="2"/>
  <rect x="180" y="160" width="65" height="390" fill="#FAF8F5" opacity="0.2" rx="2"/>
  <rect x="280" y="220" width="75" height="330" fill="#FAF8F5" opacity="0.18" rx="2"/>
  <rect x="480" y="180" width="70" height="370" fill="#FAF8F5" opacity="0.2" rx="2"/>
  <rect x="580" y="210" width="80" height="340" fill="#FAF8F5" opacity="0.17" rx="2"/>
  <rect x="680" y="250" width="60" height="300" fill="#FAF8F5" opacity="0.15" rx="2"/>
  <!-- Marina water -->
  <rect y="480" width="800" height="120" fill="url(#p3water)" opacity="0.7"/>
  <!-- Yacht -->
  <ellipse cx="400" cy="510" rx="80" ry="15" fill="#FAF8F5" opacity="0.5"/>
  <rect x="370" y="490" width="60" height="20" fill="#E8C547" opacity="0.6" rx="4"/>
  <!-- Reflection -->
  <rect x="80" y="490" width="70" height="80" fill="#0D7377" opacity="0.2"/>
  <text x="400" y="570" text-anchor="middle" fill="#FAF8F5" font-family="Georgia, serif" font-size="22">Dubai Marina</text>
</svg>
