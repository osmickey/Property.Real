<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Dubai skyline at sunset">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="40%" stop-color="#5B8DB8"/>
      <stop offset="70%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D7377"/>
      <stop offset="100%" stop-color="#1B4965"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect y="720" width="1920" height="360" fill="url(#water)" opacity="0.85"/>
  <ellipse cx="960" cy="680" rx="400" ry="30" fill="#E8C547" opacity="0.3"/>
  <!-- Burj silhouette -->
  <polygon points="960,180 940,620 980,620" fill="#0D1B2A" opacity="0.7"/>
  <polygon points="960,120 955,180 965,180" fill="url(#gold)"/>
  <!-- Buildings -->
  <rect x="400" y="480" width="80" height="240" fill="#0D1B2A" opacity="0.5"/>
  <rect x="520" y="420" width="60" height="300" fill="#0D1B2A" opacity="0.55"/>
  <rect x="620" y="380" width="100" height="340" fill="#0D1B2A" opacity="0.6"/>
  <rect x="1100" y="400" width="90" height="320" fill="#0D1B2A" opacity="0.55"/>
  <rect x="1220" y="350" width="70" height="370" fill="#0D1B2A" opacity="0.6"/>
  <rect x="1340" y="440" width="110" height="280" fill="#0D1B2A" opacity="0.5"/>
  <rect x="1500" y="460" width="85" height="260" fill="#0D1B2A" opacity="0.45"/>
  <!-- Palm tree hint -->
  <circle cx="200" cy="650" r="60" fill="#2D6A4F" opacity="0.4"/>
  <circle cx="1700" cy="640" r="50" fill="#2D6A4F" opacity="0.35"/>
  <!-- Decorative stars -->
  <circle cx="300" cy="150" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="500" cy="100" r="1.5" fill="#FFF" opacity="0.6"/>
  <circle cx="1400" cy="120" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="1600" cy="80" r="1.5" fill="#FFF" opacity="0.5"/>
</svg>
